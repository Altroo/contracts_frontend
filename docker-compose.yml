# Production docker-compose configuration
# NOTE: SSL termination is handled by facturation_frontend nginx (single reverse proxy)
services:
  web:
    build: .
    restart: always
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    extra_hosts:
      - "contrats-api.elbouazzatiholding.ma:host-gateway"
    ports:
      - '3001:3001'
    networks:
      - webnet

networks:
  webnet:
    driver: bridge
