# Production docker-compose configuration
# NOTE: SSL termination is handled by facturation_frontend nginx (single reverse proxy)
services:
  web:
    build: .
    container_name: contracts_web
    restart: always
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    extra_hosts:
      - "contrats-api.elbouazzatiholding.ma:host-gateway"
    ports:
      - '3001:3001'
    networks:
      - webnet
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f bun || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  webnet:
    driver: bridge
