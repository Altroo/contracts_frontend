<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Contract Document -->
  <rect x="80" y="40" width="240" height="320" rx="8" fill="#FFFFFF" stroke="#2C3E50" stroke-width="3"/>
  <!-- Folded Corner -->
  <path d="M260 40 L260 90 L310 90" fill="#BDC3C7" stroke="#2C3E50" stroke-width="2"/>
  <!-- Header Line -->
  <rect x="110" y="70" width="120" height="12" rx="6" fill="#27AE60"/>
  <rect x="110" y="90" width="80" height="8" rx="4" fill="#95A5A6"/>
  <!-- Contract Lines -->
  <rect x="110" y="120" width="180" height="6" rx="3" fill="#ECF0F1"/>
  <rect x="110" y="140" width="160" height="6" rx="3" fill="#ECF0F1"/>
  <rect x="110" y="160" width="180" height="6" rx="3" fill="#ECF0F1"/>
  <rect x="110" y="180" width="140" height="6" rx="3" fill="#ECF0F1"/>
  <!-- Divider -->
  <line x1="100" y1="210" x2="300" y2="210" stroke="#BDC3C7" stroke-width="2"/>
  <!-- More Lines -->
  <rect x="110" y="230" width="180" height="6" rx="3" fill="#ECF0F1"/>
  <rect x="110" y="250" width="170" height="6" rx="3" fill="#ECF0F1"/>
  <!-- Signature Line -->
  <line x1="110" y1="300" x2="200" y2="300" stroke="#2C3E50" stroke-width="2"/>
  <text x="115" y="320" font-size="10" fill="#95A5A6" font-family="sans-serif">Signature</text>
  <!-- Pen -->
  <line x1="280" y1="260" x2="320" y2="220" stroke="#E67E22" stroke-width="4" stroke-linecap="round"/>
  <polygon points="280,260 275,270 285,265" fill="#E67E22"/>
  <!-- Checkmark Badge -->
  <circle cx="300" cy="100" r="28" fill="#27AE60"/>
  <path d="M285 100 L295 110 L315 90" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
